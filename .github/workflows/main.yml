name: Recovery Kernel Builder (d2s)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Choose build type"
        required: true
        default: "recovery"
        type: choice
        options:
        - recovery
        - boot

jobs:
  build_d2s:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          # تم حذف التوكن الخاص واستخدام الافتراضي
          token: ${{ github.token }}

      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --force --recursive --remote

      - name: Build Recovery Kernel for d2s
        # تم تعديل البارامترات: -k Y (كيرنل نعم) و -r Y (ريكفري نعم)
        # هاد الأمر رح يشغل سكريبت المطور ويجبره يدمج recovery.config
        run: ./workflows.sh -m d2s -k Y -r Y

      - name: Upload Recovery Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Recovery-d2s
          # المسار المتوقع للملفات الناتجة (تأكد من مجلد build/out عندك)
          path: build/out/d2s/
